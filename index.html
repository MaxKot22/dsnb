    <style>
        /* Общие стили */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
        }

        /* --- 1. ПАНЕЛЬ УПРАВЛЕНИЯ (ЛЕВАЯ) --- */
        .controls {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            /* Позволяет панели прокручиваться, если услуг много */
            max-height: 90vh;
            overflow-y: auto;
        }
        .controls h2 {
            margin-top: 0;
            color: #333;
        }
        .controls label {
            display: block;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #555;
        }
        .controls input[type="text"],
        .controls input[type="number"],
        .controls textarea {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .controls textarea {
            height: 100px;
            resize: vertical;
        }
        
        /* Стили для строк услуг в панели управления */
        #service-list-controls {
            margin-top: 10px;
        }
        .service-row {
            display: grid;
            grid-template-columns: 1fr 100px 30px;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        .service-row input {
            padding: 8px;
        }
        .delete-row-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .delete-row-btn:hover { background-color: #c0392b; }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        #add-service-btn {
            background-color: #28a745;
            color: white;
        }
        #add-service-btn:hover { background-color: #218838; }
        
        #download-pdf {
            background-color: #007bff;
            color: white;
        }
        #download-pdf:hover { background-color: #0056b3; }


        /* --- 2. ПРЕДПРОСМОТР СЧЕТА (ПРАВЫЙ) --- */
        #invoice-preview {
            background-color: #ffffff;
            padding: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
        }
        #invoice-preview h1 {
            color: #000;
            margin-top: 0;
            text-align: right;
        }
        .invoice-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .invoice-details table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .invoice-details th, .invoice-details td {
            border: 1px solid #eee;
            padding: 12px;
            text-align: left;
        }
        .invoice-details th {
            background-color: #f9f9f9;
        }
        .total {
            text-align: right;
            margin-top: 20px;
            font-size: 1.2em;
            font-weight: bold;
        }

        /* Медиа-запрос для маленьких экранов (телефонов) */
        @media (max-width: 800px) {
            body {
                grid-template-columns: 1fr; /* Одна колонка */
            }
            .controls {
                max-height: none; /* Убираем ограничение по высоте */
                order: 2; /* Панель управления теперь внизу */
            }
            #invoice-preview {
                order: 1; /* Предпросмотр теперь вверху */
            }
        }

    </style>
</head>
<body>

    <div class="controls">
        <h2>Данные для счета</h2>
        
        <label for="invoice-num">Номер счета:</label>
        <input type="text" id="invoice-num" value="12345">
        
        <label for="client-name">Имя клиента:</label>
        <input type="text" id="client-name" placeholder="ООО 'Ромашка'">
        
        <label for="client-details">Реквизиты клиента:</label>
        <textarea id="client-details" placeholder="ИНН, адрес..."></textarea>
        
        <hr style="margin-top: 20px;">
        
        <label>Список Услуг:</label>
        <div id="service-list-controls">
            </div>
        
        <button id="add-service-btn" type="button" class="btn">
            + Добавить услугу
        </button>
        
        <hr style="margin-top: 20px;">
        
        <button id="download-pdf" class="btn">Скачать PDF</button>
    </div>

    <div id="invoice-preview">
        <h1>Счет №<span id="preview-invoice-num">...</span></h1>
        
        <div class="invoice-header">
            <div>
                <strong>Исполнитель:</strong><br>
                ИП Иванов И.И.<br>
                ИНН 1234567890<br>
                г. Москва, ул. Примерная, д. 1
            </div>
            <div>
                <strong>Заказчик:</strong><br>
                <strong id="preview-client-name">...</strong><br>
                <div id="preview-client-details" style="white-space: pre-line;">...</div>
            </div>
        </div>

        <div class="invoice-details">
            <table>
                <thead>
                    <tr>
                        <th>Описание Услуги</th>
                        <th>Стоимость</th>
                    </tr>
                </thead>
                <tbody id="preview-service-list">
                    </tbody>
            </table>
        </div>
        
        <div class="total">
            ИТОГО: <span id="preview-total-cost">0.00</span> ₽
        </div>
    </div>


    <script>
        // --- Находим все ОСНОВНЫЕ элементы ---
        const controls = document.querySelector('.controls');
        const invoiceNumInput = document.getElementById('invoice-num');
        const clientNameInput = document.getElementById('client-name');
        const clientDetailsInput = document.getElementById('client-details');
        const serviceListControls = document.getElementById('service-list-controls');
        const addServiceBtn = document.getElementById('add-service-btn');
        const downloadPdfBtn = document.getElementById('download-pdf');

        // --- Элементы в ПРЕДПРОСМОТРЕ ---
        const invoiceNumPreview = document.getElementById('preview-invoice-num');
        const clientNamePreview = document.getElementById('preview-client-name');
        const clientDetailsPreview = document.getElementById('preview-client-details');
        const previewServiceList = document.getElementById('preview-service-list');
        const totalCostPreview = document.getElementById('preview-total-cost');
        
        
        /**
         * ГЛАВНАЯ ФУНКЦИЯ: Обновляет весь предпросмотр
         */
        function updatePreview() {
            // 1. Обновляем простые поля (Клиент, Номер счета)
            invoiceNumPreview.innerText = invoiceNumInput.value || "...";
            clientNamePreview.innerText = clientNameInput.value || "...";
            clientDetailsPreview.innerText = clientDetailsInput.value || "...";
            
            // 2. Очищаем старый список услуг в предпросмотре
            previewServiceList.innerHTML = '';
            
            // 3. Обновляем список услуг и считаем ИТОГО
            let totalCost = 0;
            
            // Находим ВСЕ строки услуг в ПАНЕЛИ УПРАВЛЕНИЯ
            const serviceRows = serviceListControls.querySelectorAll('.service-row');
            
            serviceRows.forEach(row => {
                // Находим инпуты ВНУТРИ этой строки
                const descInput = row.querySelector('.service-desc');
                const costInput = row.querySelector('.service-cost');
                
                const description = descInput.value || "Описание услуги";
                const cost = parseFloat(costInput.value) || 0;
                
                totalCost += cost;
                
                // Создаем новую строку (<tr>) для таблицы ПРЕДПРОСМОТРА
                const previewRow = document.createElement('tr');
                previewRow.innerHTML = `
                    <td>${description}</td>
                    <td>${cost.toFixed(2)} ₽</td>
                `;
                // Добавляем ее в таблицу предпросмотра
                previewServiceList.appendChild(previewRow);
            });
            
            // 4. Обновляем ИТОГО
            totalCostPreview.innerText = totalCost.toFixed(2);
        }

        /**
         * Функция: Добавляет новую строку в ПАНЕЛИ УПРАВЛЕНИЯ
         */
        function addServiceRow() {
            // 1. Создаем div-контейнер для новой строки
            const newRow = document.createElement('div');
            newRow.classList.add('service-row');
            
            // 2. Заполняем его HTML-кодом с инпутами и кнопкой
            newRow.innerHTML = `
                <input type="text" class="service-desc" placeholder="Описание услуги">
                <input type="number" classка" step="0.01">
                <button type="button" class="delete-row-btn">X</button>
            `;
            
            // 3. Добавляем эту строку в контейнер
            serviceListControls.appendChild(newRow);
            
            // 4. ВАЖНО: Добавляем слушателя событий на кнопку "Удалить" этой строки
            newRow.querySelector('.delete-row-btn').addEventListener('click', () => {
                newRow.remove(); // Удаляем эту строку
                updatePreview(); // Пересчитываем все
            });
            
            // 5. ВАЖНО: Добавляем слушателей на инпуты этой строки
            newRow.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', updatePreview);
            });
        }
        
        // --- Назначаем слушателей событий ---

        // 1. Слушатель на кнопку "Добавить услугу"
        addServiceBtn.addEventListener('click', () => {
            addServiceRow();
            updatePreview(); 
        });

        // 2. Слушатели на "общие" инпуты (номер, клиент)
        [invoiceNumInput, clientNameInput, clientDetailsInput].forEach(input => {
            input.addEventListener('input', updatePreview);
        });
        
        // 3. Слушатель на кнопку "Скачать PDF"
        downloadPdfBtn.addEventListener('click', () => {
            // Вот здесь мы используем функцию html2pdf()
            // Она стала доступна из-за большого блока кода в <head>
            
            const invoiceElement = document.getElementById('invoice-preview');
            const opt = {
                margin:       10,
                filename:     `Счет_${invoiceNumInput.value}_${clientNameInput.value}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            // Запускаем генерацию PDF
            html2pdf().from(invoiceElement).set(opt).save();
        });

        // --- Запуск при загрузке ---
        addServiceRow(); // Добавляем одну пустую строку при загрузке
        updatePreview(); // Запускаем один раз, чтобы синхронизировать все
        
    </script>

</body>
</html>
